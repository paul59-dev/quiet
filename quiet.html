<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EVEIL - Discipline & Ladder</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #3b82f6;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --text: #f8fafc;
        }

        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* --- LAYOUT PC (Ecrans > 850px) --- */
        @media (min-width: 850px) {
            .container {
                flex-direction: row;
                align-items: flex-start;
            }
            .sidebar {
                width: 380px;
                position: sticky;
                top: 20px;
                flex-shrink: 0;
            }
            .main-content {
                flex-grow: 1;
            }
        }

        /* --- CARTES --- */
        .card {
            background: var(--card);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 20px;
        }

        .rank-header { text-align: center; }
        #rank-medal { font-size: 5.5rem; display: block; margin: 10px 0; filter: drop-shadow(0 0 10px rgba(255,255,255,0.1)); }
        #rank-name { font-weight: 900; font-size: 1.8rem; text-transform: uppercase; letter-spacing: 2px; }
        .lp-display { font-size: 1.2rem; font-weight: bold; color: var(--primary); margin: 5px 0; }

        /* BARRE DE PROGRESSION */
        .progress-container { background: rgba(0,0,0,0.3); border-radius: 20px; height: 12px; margin: 15px 0; overflow: hidden; }
        #progress-bar { background: linear-gradient(90deg, var(--primary), var(--success)); height: 100%; width: 0%; transition: width 0.6s ease; }

        /* EXERCICES */
        .exo-list { display: flex; flex-direction: column; gap: 10px; }
        .exo-item {
            background: rgba(255,255,255,0.03);
            padding: 15px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.2s;
        }
        .exo-item.checked { border-color: var(--success); background: rgba(34, 197, 94, 0.1); }
        .exo-item input { width: 22px; height: 22px; margin-right: 15px; accent-color: var(--success); }

        /* CALENDRIER */
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .day { aspect-ratio: 1; background: rgba(255,255,255,0.05); border-radius: 6px; font-size: 0.7rem; display: flex; align-items: center; justify-content: center; }
        .day.green { background: var(--success); box-shadow: 0 0 8px rgba(34, 197, 94, 0.4); }
        .day.orange { background: var(--warning); }
        .day.today { border: 2px solid var(--primary); font-weight: bold; }

        /* BOUTONS */
        .btn { padding: 12px; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; font-size: 0.9rem; transition: 0.3s; }
        .btn-danger { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid var(--danger); width: 100%; }
        .btn-danger:hover { background: var(--danger); color: white; }
        .btn-save { background: rgba(255,255,255,0.05); color: var(--text); border: 1px solid rgba(255,255,255,0.1); }
        
        .timer-box { background: rgba(0,0,0,0.2); border-radius: 15px; padding: 15px; margin: 20px 0; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <!-- BARRE LATERALE (HAUT SUR MOBILE) -->
    <div class="sidebar">
        <div class="card rank-header">
            <span id="rank-medal">⚪</span>
            <div id="rank-name">NON CLASSÉ</div>
            <div class="lp-display"><span id="lp-val">0</span> LP</div>
            
            <div class="progress-container">
                <div id="progress-bar"></div>
            </div>
            <div id="next-rank-label" style="font-size: 0.75rem; opacity: 0.6;">Objectif : 50 LP</div>

            <div class="timer-box">
                <div id="tree-icon" style="font-size: 3rem;">🌱</div>
                <div id="timer" style="font-family: monospace; font-size: 1.4rem; font-weight: bold; margin: 5px 0;">00:00:00</div>
                <div style="font-size: 0.65rem; opacity: 0.5; text-transform: uppercase;">Abstinence totale</div>
            </div>

            <button class="btn btn-danger" onclick="resetAddiction()">ÉCHEC (RESET ARBRE)</button>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;">
                <button class="btn btn-save" onclick="exportData()">💾 SAUVER</button>
                <button class="btn btn-save" onclick="importData()">📂 CHARGER</button>
            </div>
        </div>
    </div>

    <!-- CONTENU PRINCIPAL (EXOS & CALENDRIER) -->
    <div class="main-content">
        <div class="card">
            <h2 style="margin: 0 0 20px 0; font-size: 1.4rem;">🏋️ Entraînement (<span id="exo-count" style="color: var(--primary);">0/10</span>)</h2>
            <div class="exo-list" id="exo-list"></div>
            <p style="font-size: 0.75rem; color: var(--danger); margin-top: 15px; text-align: center;">
                Chaque exercice non fait à minuit retire 1 LP du score.
            </p>
        </div>

        <div class="card">
            <h2 style="margin: 0 0 20px 0; font-size: 1.4rem;">📅 Historique mensuel</h2>
            <div class="cal-grid" id="calendar"></div>
            <div style="margin-top: 15px; display: flex; gap: 15px; font-size: 0.7rem; justify-content: center; opacity: 0.5;">
                <span><b style="color:var(--success)">●</b> 10/10</span>
                <span><b style="color:var(--warning)">●</b> 5+/10</span>
            </div>
        </div>
    </div>
</div>

<script>
    const EXOS = ["20 Pompes", "30 Squats", "1min Gainage", "40 Jumping Jacks", "15 Burpees", "20 Fentes", "30 Abdos", "10 Tractions", "2min Course", "10mn Étirements"];
    const RANKS = [
        { name: "Non Classé", min: 0, icon: "⚪", color: "#94a3b8" },
        { name: "Bronze", min: 50, icon: "🥉", color: "#cd7f32" },
        { name: "Argent", min: 150, icon: "🥈", color: "#c0c0c0" },
        { name: "Or", min: 300, icon: "🥇", color: "#ffd700" },
        { name: "Platine", min: 600, icon: "💎", color: "#e5e4e2" },
        { name: "Légende", min: 1000, icon: "👑", color: "#a855f7" }
    ];

    let state = JSON.parse(localStorage.getItem('eveil_v6_final')) || {
        points: 0,
        startDate: new Date().getTime(),
        sportHistory: {},
        lastCheckDate: new Date().toISOString().split('T')[0],
        lastSeasonMonth: new Date().getMonth()
    };

    function save() { localStorage.setItem('eveil_v6_final', JSON.stringify(state)); }

    // --- LOGIQUE SAISON & DECAY ---
    function temporalChecks() {
        const now = new Date();
        const todayStr = now.toISOString().split('T')[0];

        // 1. Reset Saison (Mensuel)
        if (state.lastSeasonMonth !== now.getMonth()) {
            state.points = Math.max(0, state.points - 500);
            state.lastSeasonMonth = now.getMonth();
            alert(`🌦 NOUVELLE SAISON : Prélèvement de 500 LP. Reprouve ta force !`);
        }

        // 2. Pénalité quotidienne
        if (state.lastCheckDate !== todayStr) {
            const yesterday = state.lastCheckDate;
            const done = (state.sportHistory[yesterday] || []).length;
            const missed = 10 - done;
            if (missed > 0) {
                state.points = Math.max(0, state.points - missed);
                alert(`⚠️ Hier : ${missed} exercice(s) manqué(s). -${missed} LP.`);
            }
            state.lastCheckDate = todayStr;
        }
        save();
    }

    // --- INTERFACE ---
    function updateUI() {
        let cur = RANKS[0], next = RANKS[1];
        for (let r of RANKS) { if (state.points >= r.min) { cur = r; next = RANKS[RANKS.indexOf(r)+1] || r; } }

        document.getElementById('rank-medal').innerText = cur.icon;
        document.getElementById('rank-name').innerText = cur.name;
        document.getElementById('rank-name').style.color = cur.color;
        document.getElementById('lp-val').innerText = state.points;

        const range = next.min - cur.min;
        const prog = next === cur ? 100 : ((state.points - cur.min) / range) * 100;
        document.getElementById('progress-bar').style.width = `${prog}%`;
        document.getElementById('next-rank-label').innerText = next === cur ? "RANG MAX ATTEINT" : `Objectif ${next.name} : ${next.min} LP`;
    }

    function renderExos() {
        const t = new Date().toISOString().split('T')[0];
        const done = state.sportHistory[t] || [];
        document.getElementById('exo-list').innerHTML = EXOS.map((ex, i) => `
            <div class="exo-item ${done.includes(i) ? 'checked' : ''}" onclick="toggleExo(${i})">
                <input type="checkbox" ${done.includes(i) ? 'checked' : ''} onchange="return false;">
                <span>${ex}</span>
            </div>
        `).join('');
        document.getElementById('exo-count').innerText = `${done.length}/10`;
    }

    function toggleExo(i) {
        const t = new Date().toISOString().split('T')[0];
        if (!state.sportHistory[t]) state.sportHistory[t] = [];
        if (!state.sportHistory[t].includes(i)) {
            state.sportHistory[t].push(i);
            state.points += 1;
        } else {
            state.sportHistory[t] = state.sportHistory[t].filter(x => x !== i);
            state.points = Math.max(0, state.points - 1);
        }
        save(); renderExos(); renderCalendar(); updateUI();
    }

    function renderCalendar() {
        const cal = document.getElementById('calendar'); cal.innerHTML = "";
        const now = new Date();
        const days = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
        for(let i=1; i<=days; i++) {
            const dStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
            const count = (state.sportHistory[dStr] || []).length;
            let cls = count >= 10 ? "green" : (count >= 5 ? "orange" : "");
            cal.innerHTML += `<div class="day ${cls} ${i === now.getDate() ? 'today' : ''}">${i}</div>`;
        }
    }

    function updateTimer() {
        const diff = new Date().getTime() - state.startDate;
        const d = Math.floor(diff/86400000), h = Math.floor((diff/3600000)%24), m = Math.floor((diff/60000)%60), s = Math.floor((diff/1000)%60);
        document.getElementById('timer').innerText = `${d}j ${h}h ${m}m ${s}s`;
        const icon = document.getElementById('tree-icon');
        if(d >= 30) icon.innerText = "🌸"; else if(d >= 15) icon.innerText = "🌳"; else if(d >= 7) icon.innerText = "🌿"; else icon.innerText = "🌱";
    }

    // --- SAUVEGARDE ---
    function exportData() {
        const blob = new Blob([JSON.stringify(state)], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = 'eveil_discipline.json'; a.click();
    }

    function importData() {
        const input = document.createElement('input'); input.type = 'file';
        input.onchange = e => {
            const reader = new FileReader(); reader.readAsText(e.target.files[0]);
            reader.onload = re => { state = JSON.parse(re.target.result); save(); location.reload(); }
        }; input.click();
    }

    function resetAddiction() {
        if(confirm("Confirmer la rechute ? L'arbre repart de zéro.")) {
            state.startDate = new Date().getTime(); save();
        }
    }

    temporalChecks(); renderExos(); renderCalendar(); updateUI(); setInterval(updateTimer, 1000); updateTimer();
</script>

</body>
</html>
