<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Eveil">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3069/3069172.png">

    <title>EVEIL - Discipline & Ladder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="sidebar">
        <div class="card rank-header">
            <div id="prestige-area"></div>
            <span id="rank-medal">⚪</span>
            <div id="rank-name">NON CLASSÉ</div>
            <div class="lp-display"><span id="lp-val">0</span> LP</div>
            
            <div class="progress-container">
                <div id="progress-bar"></div>
            </div>
            <div id="next-rank-label" style="font-size: 0.75rem; opacity: 0.6;">Objectif : 50 LP</div>

            <button id="prestige-btn" class="btn btn-prestige" onclick="passPrestige()">PASSER AU PRESTIGE SUIVANT ✨</button>

            <div class="timer-box">
                <div id="tree-icon" style="font-size: 3rem;">🌱</div>
                <div id="timer" style="font-family: monospace; font-size: 1.4rem; font-weight: bold; margin: 5px 0;">00:00:00</div>
                <div style="font-size: 0.65rem; opacity: 0.5; text-transform: uppercase;">Abstinence totale</div>
            </div>

            <button class="btn btn-danger" onclick="resetAddiction()">ÉCHEC (RESET ARBRE)</button>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;">
                <button class="btn btn-save" onclick="exportData()">💾 SAUVER</button>
                <button class="btn btn-save" onclick="importData()">📂 CHARGER</button>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="card">
            <h2 style="margin: 0 0 20px 0; font-size: 1.4rem;">🏋️ Mes Exercices (<span id="exo-count" style="color: var(--primary);">0/10</span>)</h2>
            <div class="exo-list" id="exo-list"></div>
        </div>

        <div class="card">
            <div class="cal-header">
                <button class="cal-nav-btn" onclick="changeMonth(-1)">❮</button>
                <h2 id="month-label" style="margin:0; font-size: 1.2rem; text-transform: capitalize;">Mois</h2>
                <button class="cal-nav-btn" onclick="changeMonth(1)">❯</button>
            </div>
            <div class="cal-grid" id="calendar"></div>
            <p style="font-size: 0.65rem; color: var(--danger); margin-top: 10px; text-align: center; opacity: 0.8;">
                Le 1er de chaque mois : Fin de saison (-200 LP).
            </p>
        </div>
    </div>
</div>

 <script src="index.js"></script>
</body>
</html>
