<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#05070a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Eveil">
    <link rel="manifest" href="manifest.json">

    <!-- Icône pour Chrome / Android / Navigateurs -->
    <link rel="icon" type="image/png" sizes="192x192" href="https://img.icons8.com/?size=192&id=tnO9BmtsOQD8&format=png&color=000000">

    <!-- Icône cruciale pour iPhone (iOS) -->
    <link rel="apple-touch-icon" href="https://img.icons8.com/?size=180&id=tnO9BmtsOQD8&format=png&color=000000">
    <link rel="apple-touch-icon" sizes="152x152" href="https://img.icons8.com/?size=152&id=tnO9BmtsOQD8&format=png&color=000000">
    <link rel="apple-touch-icon" sizes="180x180" href="https://img.icons8.com/?size=180&id=tnO9BmtsOQD8&format=png&color=000000">

    <title>S-SYSTEM | Solo Leveling</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="system-glow"></div>

<div class="container">
    <div class="sidebar">
        <div class="card">
            <div class="rank-display-box">
                <div class="system-title">Statut du Challenger</div>
                <span id="rank-medal">E</span>
                <div id="rank-name">RANG E</div>
                <div class="lp-display"><span id="lp-val">0</span> LP</div>
                <div class="progress-container"><div id="progress-bar"></div></div>
                <div id="next-rank-label" style="font-size: 0.65rem; color: var(--text-dim);">Progression de Rang</div>
            </div>

            <div style="margin-top: 25px; border-top: 1px solid var(--border); padding-top: 20px; text-align: center;">
                <div id="tree-icon" style="font-size: 2.5rem; margin-bottom: 10px;">🌱</div>
                <div id="timer">00:00:00</div>
                <div style="font-size: 0.6rem; color: var(--text-dim); margin-top: 5px; text-transform: uppercase;">Temps de Survie</div>
            </div>

            <button class="btn btn-danger" style="margin-top:20px" onclick="resetAddiction()">ÉCHEC DE MISSION</button>
            
            <div style="margin-top: 30px; border-top: 1px dashed var(--border); padding-top: 20px;">
                <div class="system-title">Archives du Système</div>
                <button class="btn btn-system" onclick="exportData()">Générer Code</button>
                <button class="btn btn-system" onclick="downloadBackup()" style="background: #1e293b; color: #fff; border: 1px solid var(--border);">Télécharger Fichier</button>
                <textarea id="backup-io" class="backup-input" placeholder="Collez un code ici..."></textarea>
                <button class="btn btn-danger" style="font-size:0.6rem" onclick="importData()">Restaurer via Code</button>
                <label for="file-input" class="btn btn-danger" style="display: block; text-align: center; line-height: 1.5; font-size:0.6rem">Restaurer via Fichier</label>
                <input type="file" id="file-input" style="display:none" accept=".json" onchange="importFile(event)">
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="card">
            <div class="system-title">Quête Quotidienne</div>
            
            <div class="mode-selector">
                <button id="mode-haut" class="mode-btn" onclick="setMode('haut')">💪 HAUT</button>
                <button id="mode-bas" class="mode-btn" onclick="setMode('bas')">🦵 BAS</button>
                <button id="mode-maison" class="mode-btn" onclick="setMode('maison')">🏠 MAISON</button>
                <button id="mode-bonus" class="mode-btn" onclick="setMode('bonus')">✨ BONUS</button>
            </div>

            <h2 style="margin: 0 0 20px 0;">Objectifs : <span id="exo-count">0/10</span></h2>
            <div id="exo-list"></div>
        </div>

        <div class="card" id="calendar-card">
            <div id="warning-text" style="display:none; color:var(--system-warning); font-weight:900; font-size:0.7rem; text-align:center; margin-bottom:10px; letter-spacing:1px;">⚠️ ALERTE : DÉGRADATION DE RANG IMMINENTE (-200 LP) ⚠️</div>
            <div class="system-title">Journal de Progression</div>
            <div style="display:flex; justify-content: space-between; margin-bottom:15px">
                <button onclick="changeMonth(-1)" style="background:none; border:none; color:var(--rank-color); cursor:pointer; padding: 10px;">◀</button>
                <h3 id="month-label" style="font-size:0.9rem">Mois</h3>
                <button onclick="changeMonth(1)" style="background:none; border:none; color:var(--rank-color); cursor:pointer; padding: 10px;">▶</button>
            </div>
            <div class="cal-grid" id="calendar"></div>
            <div id="next-reset-label" style="font-size:0.6rem; color:var(--text-dim); text-align:center; margin-top:15px; text-transform:uppercase;"></div>
        </div>
    </div>
</div>

 <script src="index.js"></script>
</body>
</html>
